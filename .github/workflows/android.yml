name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate debug keystore
      run: keytool -genkey -v -keystore ./debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "cn=Unknown, ou=Unknown, o=Unknown, c=Unknown"

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon --no-configuration-cache

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: viaboard-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        
    - name: Build Release APK (Unsigned)
      run: gradle assembleRelease --no-daemon --no-configuration-cache
      env:
        KEYSTORE_PATH: ./debug.keystore
        STORE_PASSWORD: android
        KEY_PASSWORD: android

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: viaboard-release-apk
        path: app/build/outputs/apk/release/app-release.apk
